<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Tarjimon Portfoliom va ai</title>
    <style>
           :root { --p: #2563eb; --s: #1e293b; --bg: #f8fafc; }  
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--s); text-align:  center; }
        
        .translator-box { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        textarea { width: 100%; height: 120px; padding: 15px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        
        .controls { display: flex; gap: 10px; justify-content: space-between; align-items: center; }
        select { padding: 10px; border-radius: 5px; border: 1px solid #cbd5e1;  flex: 1; }
        
        button { 
            background: var(--p); color: white; border: none; padding: 12px 25px; 
            border-radius: 8px; cursor: pointer; font-weight: bold;  transition: 0.3s;
        }
        button:hover { background: #1d4ed8; }
        
        #resultText { background: #f1f5f9; min-height: 100px; padding: 15px; border-radius: 10px; border: 1px dashed #cbd5e1; color: #334155; }
        .loader { display: none; color: var(--p); font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
       <h2>Global Tarjimon Xizmati</h2>
    <p style="text-align: center; color: #64748b;">O'zbek, Rus, Ingliz va Koreys tillari orasida tezkor tarjima</p>

    <div class="translator-box">
        <div class="controls">
            <select id="langFrom">
                 <option value="uz-UZ">O'zbek</option>
                 <option value="en-GB">Ingliz</option>
                 <option value="ru-RU">Rus</option>
                 <option value="ko-KR">Koreys</option>
            </select>
            <span>➡</span>
            <select id="langTo">
                <option value="en-GB">Ingliz</option>
                <option value="uz-UZ" selected>O'zbek</option>
                <option value="ru-RU">Rus</option>
                <option value="ko-KR">Koreys</option>
            </select>
        </div>

        <textarea  id="inputText" placeholder="Matnni shu yerga yozing..."></textarea>
        
        <button onclick="translateText()">Tarjima qilish</button>
        
        <div id="loader" class="loader">Tarjima qilinmoqda...</div>
        
        <div id="resultText">Tarjima bu yerda chiqadi...</div>
    </div>
</div>

<script>
    async function translateText() {
        const text = document.getElementById('inputText').value;
        const from = document.getElementById('langFrom').value;
        const to = document.getElementById('langTo').value;
        const resultDiv = document.getElementById('resultText');
        const loader = document.getElementById('loader');

        if(!text.trim()) return alert("Matn kiriting!");

        loader.style.display = "block";
        resultDiv.innerText = "Kuting...";

        try {
            // Bepul MyMemory API-dan foydalanamiz
            const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);
            const data = await response.json();
            
            if(data.responseData.translatedText) {
                resultDiv.innerText = data.responseData.translatedText;
            } else {
                resultDiv.innerText = "Xatolik yuz berdi.";
            }
        } catch (error) {
            resultDiv.innerText = "Internet bilan bog'liq xatolik!";
        } finally {
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
</body>
</html>
